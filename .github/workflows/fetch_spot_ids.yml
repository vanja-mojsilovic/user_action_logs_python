name: Fetch SpotIDs

# Manual run only — no push / PR / schedule triggers.
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SPOTID_FIELD: ${{ secrets.SPOTID_FIELD }}
          JIRA_VERIFY_SSL: ${{ secrets.JIRA_VERIFY_SSL }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          ENTRY_TAB: ${{ secrets.ENTRY_TAB }}
          RESULT_TAB: ${{ secrets.RESULT_TAB }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python main.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spot-ids
          path: |
            spot_ids.txt
            spot_ids_in_clause.sql
          if-no-files-found: warn