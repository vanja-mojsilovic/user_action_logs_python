name: TMT Report

# Manual run only.
on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TMT report
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          ENTRY_TAB: ${{ secrets.ENTRY_TAB }}
          PG_ADMIN_TAB: ${{ secrets.PG_ADMIN_TAB }}
          TMT_REPORT_TAB: ${{ secrets.TMT_REPORT_TAB }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python tmt_report.py